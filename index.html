<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FEFAF0">
  <title>Quiz Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="hub-screen">
    <div class="hub-topbar">
      <div class="hub-breadcrumb">
        <a class="breadcrumb-home" href="https://dmnfang.github.io">Home</a>
        <span class="breadcrumb-sep">›</span>
        <span class="breadcrumb-current">Quiz Hub</span>
      </div>
      <div class="grade-toggle">
        <button class="grade-btn active" data-grade="all">All</button>
        <button class="grade-btn" data-grade="grade3">Grade 3</button>
        <button class="grade-btn" data-grade="grade4">Grade 4</button>
      </div>
    </div>

    <div class="hub-body">
      <div class="quiz-panel">
        <div class="panel-title">Choose a quiz</div>
        <div class="quiz-list" id="quiz-list">

          <div class="quiz-card" data-grade="grade4">
            <div class="quiz-card-info">
              <div class="quiz-card-name">Schedule Quiz</div>
              <div class="quiz-card-tags">
                <span class="tag tag-grade">Grade 4</span>
                <span class="tag tag-unit">Unit 3</span>
                <span class="tag tag-topic">Days of the Week</span>
              </div>
            </div>
            <div class="quiz-card-actions">
              <a class="open-btn" href="https://dmnfang.github.io/schedule-quiz/">Open</a>
            </div>
          </div>

          <div class="quiz-card" data-grade="grade4">
            <div class="quiz-card-info">
              <div class="quiz-card-name">Weather Quiz</div>
              <div class="quiz-card-tags">
                <span class="tag tag-grade">Grade 4</span>
                <span class="tag tag-unit">Unit 2</span>
                <span class="tag tag-topic">How's the Weather?</span>
              </div>
            </div>
            <div class="quiz-card-actions">
              <a class="open-btn" href="https://dmnfang.github.io/weather-quiz/">Open</a>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script>
    const gradeButtons = document.querySelectorAll('.grade-btn')
    const quizCards = document.querySelectorAll('.quiz-card')

    gradeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        gradeButtons.forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
        const grade = btn.dataset.grade
        quizCards.forEach(card => {
          if (grade === 'all' || card.dataset.grade === grade) {
            card.style.display = 'flex'
          } else {
            card.style.display = 'none'
          }
        })
      })
    })
  </script>
</body>
</html>
